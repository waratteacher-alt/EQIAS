<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">

  <title>ระบบตรวจและวิเคราะห์คุณภาพข้อสอบ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Babel for JSX (Pinned to Stable Version 7.24.0) -->

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Sarabun', 'sans-serif'], // Set default font to TH Sarabun
          },
          colors: {
            pastel: {
              blue: '#E3F2FD',
              green: '#E8F5E9',

              purple: '#F3E5F5',

          },
          animation: {
            'fade-in-up': 'fadeInUp 0.4s ease-out forwards',
            'fade-in': 'fadeIn 0.3s ease-out forwards',

          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            }
          }
        }
      }
    }
  </script>

  <style>
    /* CSS พื้นฐานและการตั้งค่าการพิมพ์ (Print Mode) */
    html { font-size: 11.2px; } /* ลดสัดส่วนเว็ปลง 70% (16px * 0.7 = 11.2px) */

      background-color: #f8fafc;
    }

    @media print {
      html { font-size: 10px !important; } /* ลดฟอนต์หน้าพิมพ์เหลือ 10 */
      body { background-color: #fff; }
      .no-print { display: none !important; }
      .print-container { padding: 0 !important; max-width: 100% !important; box-shadow: none !important; border: none !important;}
      .print-break-inside-avoid { page-break-inside: avoid; }
      .print-break-before { page-break-before: always; }
      .shadow-sm, .shadow-md, .shadow-lg { box-shadow: none !important; }
      table { border-collapse: collapse !important; width: 100% !important; }
      th, td { border: 1px solid #cbd5e1 !important; padding: 4px 8px !important; }
      /* ปรับให้การพิมพ์ออกเป็นขาวดำทางการมากขึ้น แต่ยังคงสีเน้นที่สำคัญไว้เล็กน้อย */
      .bg-pastel-blue { background-color: #f1f5f9 !important; }

    /* Custom Scrollbar สำหรับตาราง */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- ใช้ text/babel แบบมาตรฐาน โดยไม่มี parameter กวนใจ Babel -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    /* --- Inline SVG Icons --- */
    const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
    const IconTable = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"></path></svg>;
    const IconChart = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>;
    const IconCheckCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
    const IconAlertTriangle = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
    const IconUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
    const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
    const IconAlertCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
    const IconPrinter = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>;
    
    /* New Beautiful Icons */
    const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;
    const IconFileQuestion = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><circle cx="12" cy="17" r="1"></circle><path d="M12 14v-2c1.33-1 2-1.5 2-2.5a2 2 0 1 0-4 0"></path></svg>;
    const IconList = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>;
    const IconTarget = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>;
    const IconTrendingUp = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>;
    const IconTrendingDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline></svg>;
    const IconActivity = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;

    const App = () => {
      const [step, setStep] = useState(1);
      const [config, setConfig] = useState({
        numQuestions: 20,
        numStudents: 10,
        numChoices: 4,
      });

      const [answerKey, setAnswerKey] = useState([]);
      const [students, setStudents] = useState([]);
      const [results, setResults] = useState(null);
      const fileInputRef = useRef(null);

      // UI States for Notifications & Modals
      const [toastMsg, setToastMsg] = useState('');
      const [confirmModal, setConfirmModal] = useState(null);

      // Prevent Accidental Exit
      useEffect(() => {
        const handleBeforeUnload = (e) => {
          if (step > 1) {
            e.preventDefault();
            e.returnValue = '';
          }
        };
        window.addEventListener('beforeunload', handleBeforeUnload);
        return () => window.removeEventListener('beforeunload', handleBeforeUnload);
      }, [step]);

      // Handle temporary toast messages
      const showToast = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(''), 3000);
      };

      const handleConfigChange = (e) => {
        const { name, value } = e.target;
        if (value === '') {
          setConfig((prev) => ({ ...prev, [name]: '' }));
        } else {
          const intVal = parseInt(value, 10);
          setConfig((prev) => ({ ...prev, [name]: isNaN(intVal) ? '' : intVal }));
        }
      };

      const initializeData = () => {
        const numQ = Math.max(1, parseInt(config.numQuestions) || 20);
        const numS = Math.max(1, parseInt(config.numStudents) || 10);
        const numC = Math.max(2, parseInt(config.numChoices) || 4);

        setConfig({ numQuestions: numQ, numStudents: numS, numChoices: numC });
        setAnswerKey(Array(numQ).fill(''));
        
        const newStudents = Array.from({ length: numS }).map((_, i) => ({
          no: '', // เว้นช่องเลขที่ให้ว่างเปล่า เพื่อให้กรอกเองตอนหยิบข้อสอบมาตรวจ
          answers: Array(numQ).fill(''),
        }));
        
        setStudents(newStudents);
        setStep(2);
      };

      const handleKeyChange = (index, value) => {
        const newKey = [...answerKey];
        newKey[index] = value;
        setAnswerKey(newKey);
      };

      const handleStudentInfoChange = (index, value) => {
        const newStudents = [...students];
        newStudents[index].no = value;
        setStudents(newStudents);
      };

      const handleStudentAnswerChange = (studentIndex, qIndex, value) => {
        const newStudents = [...students];
        newStudents[studentIndex].answers[qIndex] = value;
        setStudents(newStudents);
      };

      // ฟังก์ชันควบคุมการกดปุ่มลูกศร (Excel-like Navigation)
      const handleKeyDown = (e, rIdx, cIdx) => {
        const { key } = e;
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
          e.preventDefault(); // ป้องกันไม่ให้ cursor ขยับไปมาในช่อง
          let nextR = rIdx;
          let nextC = cIdx;

          if (key === 'ArrowUp') nextR -= 1;
          if (key === 'ArrowDown') nextR += 1;
          if (key === 'ArrowLeft') nextC -= 1;
          if (key === 'ArrowRight') nextC += 1;

          // ควบคุมขอบเขตของแถว (Row): -1 คือ เฉลย, 0 ถึง N คือ นักเรียน
          if (nextR < -1) nextR = -1;
          if (nextR >= students.length) nextR = students.length - 1;
          
          // ควบคุมขอบเขตของคอลัมน์ (Column): 0 คือ เลขที่ (editable), 1 ถึง M คือ ข้อสอบ
          if (nextC < 0) nextC = 0;
          if (nextC > config.numQuestions) nextC = config.numQuestions;

          // กรณีที่เลื่อนไปเจอช่องว่างมุมซ้ายบน (แถวเฉลย, คอลัมน์เลขที่ ซึ่งไม่มี input ให้กรอก)
          if (nextR === -1 && nextC === 0) {
              if (key === 'ArrowLeft') nextC = 1; // ชนขอบซ้ายให้อยู่ที่เดิม
              if (key === 'ArrowUp') nextR = 0;   // ชนขอบบนให้อยู่ที่เดิม
          }

          const targetId = `cell-${nextR}-${nextC}`;
          const targetElement = document.getElementById(targetId);
          if (targetElement) {
            targetElement.focus();
            targetElement.select(); // คลุมดำตัวหนังสือเดิมให้พิมพ์ทับได้ง่าย
          }
        }
      };

      const exportCSV = () => {
        // เพิ่ม "ลำดับ" เข้าไปใน header
        const header = ["ลำดับ", "เลขที่", ...Array.from({length: config.numQuestions}, (_, i) => `ข้อ ${i+1}`)].join(",");
        const keyRow = ["", "เฉลย", ...answerKey].join(",");
        const studentRows = students.map((s, i) => [i + 1, s.no, ...s.answers].join(",")).join("\n");
        
        const csvContent = "\uFEFF" + header + "\n" + keyRow + "\n" + studentRows;
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `exam_data_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
        URL.revokeObjectURL(url);
        showToast('ส่งออกข้อมูล CSV สำเร็จ');
      };

      // ฟังก์ชันจัดการการโหลดไฟล์ CSV
      const handleImportCSV = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const text = evt.target.result;
            const rows = text.split(/\r?\n/).filter(row => row.trim() !== '');
            
            if (rows.length < 2) throw new Error("ข้อมูลในไฟล์ไม่ครบถ้วน");

            const headers = rows[0].split(',');
            // ตรวจสอบว่า CSV ที่นำเข้ามามีคอลัมน์ "ลำดับ" หรือไม่ (เพื่อรองรับไฟล์เวอร์ชันเก่า)
            const hasOrderCol = headers[0].trim() === "ลำดับ" || headers[0].trim() === "ลำดับที่";
            const offset = hasOrderCol ? 2 : 1; 
            const numQ = headers.length - offset;

            const keyParts = rows[1].split(',');
            const importedKey = keyParts.slice(offset, offset + numQ).map(v => v.trim());

            const importedStudents = [];
            for (let i = 2; i < rows.length; i++) {
              const parts = rows[i].split(',');
              const no = hasOrderCol ? parts[1].trim() : parts[0].trim();
              const ans = parts.slice(offset, offset + numQ).map(v => v.trim());
              const paddedAns = Array.from({length: numQ}).map((_, idx) => ans[idx] || '');
              importedStudents.push({ no, answers: paddedAns });
            }

            setConfig(prev => ({ ...prev, numQuestions: numQ, numStudents: importedStudents.length }));
            setAnswerKey(importedKey);
            setStudents(importedStudents);
            showToast('นำเข้าข้อมูลสำเร็จ');
          } catch (err) {
            setConfirmModal({
              title: "เกิดข้อผิดพลาด",
              message: "รูปแบบไฟล์ CSV ไม่ถูกต้อง กรุณาตรวจสอบไฟล์อีกครั้ง",
              type: "alert",
              onConfirm: () => setConfirmModal(null)
            });
          }
        };
        reader.readAsText(file);
        e.target.value = null;
      };

      const handleBackToSetup = () => {
        setConfirmModal({
          title: "ยืนยันการย้อนกลับ",
          message: "คุณได้นำออก (Export CSV) ข้อมูลแล้วหรือยัง?\nหากยัง ข้อมูลที่คุณกรอกไว้ทั้งหมดจะสูญหาย!\n\nต้องการย้อนกลับไปหน้าตั้งค่าใช่หรือไม่?",
          type: "confirm",
          onConfirm: () => {
            setConfirmModal(null);
            setStep(1);
          },
          onCancel: () => setConfirmModal(null)
        });
      };

      const analyzeData = () => {
        let totalScoreAll = 0;
        const gradedStudents = students.map((student, index) => {
          let score = 0;
          const correctMap = student.answers.map((ans, idx) => {
            const isCorrect = String(ans).trim() === String(answerKey[idx]).trim() && String(ans).trim() !== '';
            if (isCorrect) score++;
            return isCorrect;
          });
          totalScoreAll += score;
          // เก็บ index ดั้งเดิมไว้สำหรับอ้างอิงตอนแสดงผลให้ตรงกับเลขลำดับ
          return { ...student, originalIndex: index, score, correctMap, percentage: (score / config.numQuestions) * 100 };
        });

        const sortedStudents = [...gradedStudents].sort((a, b) => b.score - a.score);
        const N = sortedStudents.length;
        let groupSize = Math.max(1, Math.round(N * 0.27));
        if (N < 4) groupSize = 1;

        const upperGroup = sortedStudents.slice(0, groupSize);
        const lowerGroup = sortedStudents.slice(N - groupSize);

        const mean = totalScoreAll / N;
        const variance = gradedStudents.reduce((acc, curr) => acc + Math.pow(curr.score - mean, 2), 0) / N;
        const sd = Math.sqrt(variance);

        const itemStats = [];
        for (let i = 0; i < config.numQuestions; i++) {
          const totalCorrect = gradedStudents.filter(s => s.correctMap[i]).length;
          const upperCorrect = upperGroup.filter(s => s.correctMap[i]).length;
          const lowerCorrect = lowerGroup.filter(s => s.correctMap[i]).length;

          const p = totalCorrect / N;
          const r = (upperCorrect - lowerCorrect) / groupSize;

          let pMeaning = "";
          if (p > 0.8) pMeaning = "ง่ายมาก";
          else if (p >= 0.6) pMeaning = "ค่อนข้างง่าย";
          else if (p >= 0.4) pMeaning = "ปานกลาง";
          else if (p >= 0.2) pMeaning = "ค่อนข้างยาก";
          else pMeaning = "ยากมาก";

          let rMeaning = "";
          let action = "";
          if (r >= 0.4) { rMeaning = "ดีมาก"; action = "เก็บไว้ใช้ได้"; }
          else if (r >= 0.3) { rMeaning = "ดี"; action = "เก็บไว้ใช้ได้"; }
          else if (r >= 0.2) { rMeaning = "พอใช้"; action = "ควรปรับปรุง"; }
          else { rMeaning = "จำแนกไม่ได้"; action = "ควรตัดทิ้ง"; }

          itemStats.push({ 
            q: i + 1, 
            p: p.toFixed(2), 
            r: r.toFixed(2), 
            pMeaning, 
            rMeaning, 
            action 
          });
        }

        setResults({
          gradedStudents: sortedStudents,
          itemStats,
          summary: {
            totalStudents: N,
            mean: mean.toFixed(2),
            sd: sd.toFixed(2),
            maxScore: sortedStudents[0]?.score || 0,
            minScore: sortedStudents[N - 1]?.score || 0,
            passCount: gradedStudents.filter(s => s.percentage >= 50).length
          }
        });
        setStep(3);
      };

      const ModalOverlay = () => {
        if (!confirmModal) return null;
        return (
          <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center animate-fade-in no-print">
            <div className="bg-white rounded-xl shadow-xl p-6 max-w-sm w-full mx-4 transform transition-all animate-fade-in-up">
              <h3 className="text-xl font-bold text-slate-800 mb-2 flex items-center">
                {confirmModal.type === 'alert' ? <IconAlertCircle /> : <IconAlertTriangle />}
                <span className="ml-2">{confirmModal.title}</span>
              </h3>
              <p className="text-slate-600 mb-6 whitespace-pre-line text-lg">{confirmModal.message}</p>
              <div className="flex justify-end space-x-3">
                {confirmModal.type === 'confirm' && (
                  <button onClick={confirmModal.onCancel} className="px-4 py-2 text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition font-medium">
                    ยกเลิก
                  </button>
                )}
                <button onClick={confirmModal.onConfirm} className={`px-4 py-2 text-white rounded-lg transition font-medium ${confirmModal.type === 'confirm' ? 'bg-sky-600 hover:bg-sky-700' : 'bg-sky-600 hover:bg-sky-700'}`}>
                  ตกลง
                </button>
              </div>
            </div>
          </div>
        );
      }

      const ToastNotification = () => {
        if (!toastMsg) return null;
        return (
          <div className="fixed bottom-6 right-6 z-50 animate-fade-in-up no-print">
            <div className="bg-slate-800 text-white px-6 py-3 rounded-lg shadow-lg font-medium flex items-center space-x-2">
              <IconCheckCircle />
              <span>{toastMsg}</span>
            </div>
          </div>
        )
      }

      const renderStep1Setup = () => (
        <div className="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-100 animate-fade-in-up">
          <div className="flex items-center space-x-3 mb-6 border-b border-slate-100 pb-4">
            <div className="p-2 bg-pastel-blue rounded-lg text-sky-600">
              <IconSettings />
            </div>
            <h2 className="text-2xl font-bold text-slate-800">ตั้งค่าโครงสร้างข้อสอบ</h2>
          </div>
          
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div>
              <label className="flex items-center text-lg font-semibold text-slate-700 mb-2">
                <IconFileQuestion /><span className="ml-2">จำนวนข้อสอบ</span>
              </label>
              <input type="number" name="numQuestions" value={config.numQuestions} onChange={handleConfigChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 focus:border-sky-500 focus:bg-white focus:outline-none transition-all text-center text-lg font-medium"/>
            </div>
            <div>
              <label className="flex items-center text-lg font-semibold text-slate-700 mb-2">
                <IconUsers /><span className="ml-2">จำนวนนักเรียน</span>
              </label>
              <input type="number" name="numStudents" value={config.numStudents} onChange={handleConfigChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 focus:border-sky-500 focus:bg-white focus:outline-none transition-all text-center text-lg font-medium"/>
            </div>
            <div>
              <label className="flex items-center text-lg font-semibold text-slate-700 mb-2">
                <IconList /><span className="ml-2">จำนวนตัวเลือก</span>
              </label>
              <input type="number" name="numChoices" value={config.numChoices} onChange={handleConfigChange} className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 focus:border-sky-500 focus:bg-white focus:outline-none transition-all text-center text-lg font-medium"/>
            </div>
          </div>

          <button onClick={initializeData} className="w-full bg-sky-600 hover:bg-sky-700 text-white font-bold py-3 px-6 rounded-xl shadow-sm hover:shadow transition duration-200 flex items-center justify-center space-x-2 text-xl">
            <IconTable />
            <span>สร้างตารางกรอกข้อมูล</span>
          </button>
        </div>
      );

      const renderStep2Input = () => (
        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col h-[85vh] animate-fade-in">
          <div className="p-4 border-b border-slate-100 flex flex-wrap justify-between items-center bg-white gap-3">
            <div className="flex items-center space-x-3">
              <div className="p-2 bg-pastel-blue rounded-lg text-sky-600">
                <IconTable />
              </div>
              <h2 className="text-2xl font-bold text-slate-800">ตารางกรอกเฉลยและคำตอบ</h2>
            </div>
            <div className="flex flex-wrap items-center gap-2">
              <input type="file" accept=".csv" ref={fileInputRef} style={{ display: 'none' }} onChange={handleImportCSV} />
              
              <button onClick={() => fileInputRef.current.click()} className="bg-pastel-gray hover:bg-slate-200 text-slate-700 font-semibold py-2 px-4 rounded-lg flex items-center space-x-2 transition border border-slate-200">
                <IconUpload />
                <span className="hidden sm:inline">นำเข้า CSV</span>
              </button>
              
              <button onClick={exportCSV} className="bg-pastel-blue hover:bg-blue-100 text-sky-700 font-semibold py-2 px-4 rounded-lg flex items-center space-x-2 transition border border-blue-200">
                <IconDownload />
                <span className="hidden sm:inline">นำออก CSV</span>
              </button>

              <div className="w-px h-6 bg-slate-200 mx-1 hidden sm:block"></div>
              
              <button onClick={handleBackToSetup} className="bg-pastel-red hover:bg-red-100 text-red-600 font-semibold py-2 px-4 rounded-lg flex items-center space-x-2 transition border border-red-200">
                <IconAlertCircle />
                <span className="hidden sm:inline">ตั้งค่าใหม่</span>
              </button>
            </div>
          </div>

          <div className="flex-1 overflow-auto p-4 bg-slate-50/50">
            <div className="inline-block min-w-full align-middle">
              <table className="min-w-full border-collapse border border-slate-200 shadow-sm rounded-xl bg-white text-lg">
                <thead className="sticky top-0 z-10 shadow-sm">
                  <tr>
                    <th className="border border-slate-200 px-3 py-2 w-16 text-center font-bold bg-slate-100 text-slate-700">ลำดับ</th>
                    <th className="border border-slate-200 px-3 py-2 w-20 text-center font-bold bg-slate-100 text-slate-700">เลขที่</th>
                    {Array.from({ length: config.numQuestions }).map((_, i) => (
                      <th key={i} className="border border-slate-200 px-1 py-2 w-12 text-center font-bold bg-pastel-blue text-sky-800">

                      </th>
                    ))}
                  </tr>
                  <tr className="bg-emerald-50">
                    <td colSpan={2} className="border border-slate-200 px-4 py-2 text-right font-bold text-emerald-700 shadow-sm">
                      เฉลย &rarr;
                    </td>
                    {answerKey.map((key, i) => (
                      <td key={i} className="border border-slate-200 p-1 text-center">
                        <input 
                          id={`cell--1-${i + 1}`} // ID สำหรับลูกศร r=-1, c=1..M
                          type="text" 
                          value={key}
                          onChange={(e) => handleKeyChange(i, e.target.value)}
                          onKeyDown={(e) => handleKeyDown(e, -1, i + 1)}
                          className="w-full text-center bg-white border border-emerald-300 rounded font-bold text-emerald-700 focus:ring-2 focus:ring-emerald-500 focus:outline-none transition-shadow"
                          maxLength={1}
                        />
                      </td>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {students.map((student, sIdx) => (
                    <tr key={sIdx} className="hover:bg-slate-50 transition-colors">
                      <td className="border border-slate-200 px-3 py-2 text-center bg-slate-100 font-bold text-slate-500">
                        {sIdx + 1}
                      </td>
                      <td className="border border-slate-200 px-3 py-2 text-center bg-slate-50">
                        <input 
                          id={`cell-${sIdx}-0`} // ID สำหรับลูกศร r=sIdx, c=0
                          type="text" 
                          value={student.no}
                          onChange={(e) => handleStudentInfoChange(sIdx, e.target.value)}
                          onKeyDown={(e) => handleKeyDown(e, sIdx, 0)}
                          className="w-full text-center bg-transparent focus:bg-white focus:ring-2 focus:ring-sky-500 rounded font-medium text-slate-700 outline-none transition-shadow"
                        />
                      </td>
                      {student.answers.map((ans, qIdx) => (
                        <td key={qIdx} className="border border-slate-200 p-1 text-center">
                          <input 
                            id={`cell-${sIdx}-${qIdx + 1}`} // ID สำหรับลูกศร r=sIdx, c=1..M
                            type="text" 
                            value={ans}
                            onChange={(e) => handleStudentAnswerChange(sIdx, qIdx, e.target.value)}
                            onKeyDown={(e) => handleKeyDown(e, sIdx, qIdx + 1)}
                            className="w-full text-center bg-transparent focus:bg-white focus:ring-2 focus:ring-sky-500 rounded font-medium text-slate-700 outline-none transition-shadow"
                            maxLength={1}
                          />
                        </td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          <div className="p-4 border-t border-slate-100 bg-white flex justify-end">
            <button onClick={analyzeData} className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-8 rounded-xl shadow-sm hover:shadow-md transition duration-200 flex items-center space-x-2 text-xl">
              <IconChart />
              <span>ประมวลผลและวิเคราะห์ข้อสอบ</span>
            </button>
          </div>
        </div>
      );

      const renderStep3Report = () => {
        if (!results) return null;

        return (
          <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden print-container animate-fade-in-up">
            {/* Header Report */}
            <div className="p-6 border-b border-slate-100 bg-slate-800 text-white flex justify-between items-center no-print">
              <div>
                <h2 className="text-2xl font-bold flex items-center space-x-2">
                  <IconChart />
                  <span>รายงานผลการประเมินและวิเคราะห์ข้อสอบ</span>
                </h2>
                <p className="text-slate-300 mt-1 text-lg">ฉบับสมบูรณ์ (Printable Version)</p>
              </div>
              <div className="flex space-x-3">
                <button onClick={() => setStep(2)} className="bg-white/10 hover:bg-white/20 text-white font-medium py-2 px-4 rounded-xl transition border border-white/20">
                  กลับไปแก้ไข
                </button>
                <button onClick={() => window.print()} className="bg-sky-500 hover:bg-sky-600 text-white font-bold py-2 px-6 rounded-xl shadow transition flex items-center space-x-2">
                  <IconPrinter />
                  <span>พิมพ์รายงานฉบับสมบูรณ์</span>
                </button>
              </div>
            </div>

            <div className="p-8 print:p-0">
              {/* Report Title for Print */}
              <div className="hidden print:block text-center mb-8">
                <h2 className="text-2xl font-bold">รายงานสรุปผลการสอบและการวิเคราะห์คุณภาพข้อสอบ</h2>
                <p className="text-gray-600">จำนวนข้อสอบ {config.numQuestions} ข้อ | จำนวนผู้เข้าสอบ {results.summary.totalStudents} คน</p>
              </div>

              {/* Part 1: ตารางเฉลยและคำตอบ */}
              <div className="mb-10 print-break-inside-avoid">
                <h3 className="text-xl font-bold text-slate-800 mb-4 border-l-4 border-sky-500 pl-3">ส่วนที่ 1: ตารางแสดงเฉลยและคำตอบของผู้เข้าสอบ</h3>
                <div className="overflow-x-auto rounded-xl border border-slate-200">
                  <table className="min-w-full text-center text-[15px] print:text-[14px]">
                    <thead className="bg-slate-100">
                      <tr>
                        <th className="p-2 border-b border-r w-16">ลำดับ</th>
                        <th className="p-2 border-b border-r w-20">เลขที่</th>
                        {Array.from({ length: config.numQuestions }).map((_, i) => (
                          <th key={i} className="p-1 border-b border-r font-semibold text-slate-600 bg-pastel-blue">ข้อ {i + 1}</th>
                        ))}
                      </tr>
                      <tr className="bg-emerald-50">
                        <td colSpan={2} className="p-2 border-b border-r font-bold text-emerald-700 text-right">เฉลย</td>
                        {answerKey.map((key, i) => (
                          <td key={i} className="p-1 border-b border-r font-bold text-emerald-700">{key}</td>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {/* เรียงตามข้อมูลต้นฉบับใน students */}
                      {students.map((student, sIdx) => {
                        // ค้นหานักเรียนใน gradedStudents เพื่อเอา correctMap มาตรวจถูกผิด
                        const gradedS = results.gradedStudents.find(gs => gs.originalIndex === sIdx);
                        return (
                          <tr key={sIdx} className="border-b">
                            <td className="p-2 border-r text-center font-bold text-slate-500 bg-slate-100">{sIdx + 1}</td>
                            <td className="p-2 border-r font-medium bg-slate-50">{student.no}</td>
                            {student.answers.map((ans, qIdx) => {
                              const isCorrect = gradedS.correctMap[qIdx];
                              return (
                                <td key={qIdx} className={`p-1 border-r ${!isCorrect && ans !== '' ? 'text-red-500 font-medium bg-red-50/30 print:bg-transparent' : 'text-slate-700'}`}>
                                  {ans || '-'}
                                </td>
                              );
                            })}
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                <p className="text-sm text-slate-500 mt-2">* ข้อความสีแดง หมายถึงคำตอบที่ผิดหรือไม่ตรงกับเฉลย</p>
              </div>

              {/* Part 2: คะแนนและสถิติ */}
              <div className="mb-10 print-break-before print-break-inside-avoid">
                <h3 className="text-xl font-bold text-slate-800 mb-4 border-l-4 border-emerald-500 pl-3">ส่วนที่ 2: สรุปคะแนนผู้สอบและสถิติพื้นฐาน</h3>
                
                {/* Stats Summary Cards */}
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                  <div className="bg-pastel-blue rounded-xl p-4 border border-blue-100 text-center print:border-gray-300 relative overflow-hidden">
                    <div className="absolute -right-4 -bottom-4 opacity-10 text-sky-600"><IconTarget /></div>
                    <p className="flex items-center justify-center text-base font-semibold text-sky-700 mb-1"><IconTarget /><span className="ml-2">คะแนนเฉลี่ย</span></p>
                    <p className="text-4xl font-bold text-slate-800">{results.summary.mean}</p>
                  </div>
                  <div className="bg-pastel-green rounded-xl p-4 border border-emerald-100 text-center print:border-gray-300 relative overflow-hidden">
                    <div className="absolute -right-4 -bottom-4 opacity-10 text-emerald-600"><IconTrendingUp /></div>
                    <p className="flex items-center justify-center text-base font-semibold text-emerald-700 mb-1"><IconTrendingUp /><span className="ml-2">คะแนนสูงสุด</span></p>
                    <p className="text-4xl font-bold text-slate-800">{results.summary.maxScore}</p>
                  </div>
                  <div className="bg-pastel-red rounded-xl p-4 border border-red-100 text-center print:border-gray-300 relative overflow-hidden">
                    <div className="absolute -right-4 -bottom-4 opacity-10 text-red-600"><IconTrendingDown /></div>
                    <p className="flex items-center justify-center text-base font-semibold text-red-700 mb-1"><IconTrendingDown /><span className="ml-2">คะแนนต่ำสุด</span></p>
                    <p className="text-4xl font-bold text-slate-800">{results.summary.minScore}</p>
                  </div>
                  <div className="bg-pastel-purple rounded-xl p-4 border border-purple-100 text-center print:border-gray-300 relative overflow-hidden">
                    <div className="absolute -right-4 -bottom-4 opacity-10 text-purple-600"><IconActivity /></div>
                    <p className="flex items-center justify-center text-base font-semibold text-purple-700 mb-1"><IconActivity /><span className="ml-2">ส่วนเบี่ยงเบน</span></p>
                    <p className="text-4xl font-bold text-slate-800">{results.summary.sd}</p>
                  </div>
                </div>

                {/* Score Table */}
                <div className="overflow-x-auto rounded-xl border border-slate-200">
                  <table className="min-w-full text-center">
                    <thead className="bg-slate-100">
                      <tr>
                        <th className="border p-3">อันดับที่</th>
                        <th className="border p-3">เลขที่ผู้สอบ</th>
                        <th className="border p-3">คะแนนที่ได้ (เต็ม {config.numQuestions})</th>
                        <th className="border p-3">คิดเป็นร้อยละ (%)</th>
                        <th className="border p-3">ผลการประเมิน (เกณฑ์ 50%)</th>
                      </tr>
                    </thead>
                    <tbody>
                      {results.gradedStudents.map((s, i) => (
                        <tr key={i} className="border-b hover:bg-slate-50">
                          <td className="border p-3 font-semibold text-slate-600">{i + 1}</td>
                          <td className="border p-3 font-medium">{s.no}</td>
                          <td className="border p-3 font-bold text-sky-600">{s.score}</td>
                          <td className="border p-3">{s.percentage.toFixed(1)}%</td>
                          <td className="border p-3">
                            {s.percentage >= 50 ? 
                              <span className="text-emerald-600 font-bold">ผ่านเกณฑ์</span> : 
                              <span className="text-red-500 font-bold">ไม่ผ่าน</span>
                            }
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Part 3: คุณภาพข้อสอบ (Item Analysis) */}
              <div className="print-break-before print-break-inside-avoid">
                <h3 className="text-xl font-bold text-slate-800 mb-4 border-l-4 border-purple-500 pl-3">ส่วนที่ 3: การวิเคราะห์คุณภาพข้อสอบรายข้อ (Item Analysis)</h3>
                <div className="mb-4 text-base text-slate-700 bg-pastel-gray p-4 border border-slate-200 rounded-xl">
                  <strong>เกณฑ์การวิเคราะห์ทางสถิติ:</strong> วิเคราะห์โดยใช้เทคนิคกลุ่มสูง-กลุ่มต่ำ (Upper-Lower 27%) <br/>
                  • <strong>ความยากง่าย (p):</strong> ระดับที่เหมาะสมคือ 0.20 - 0.80 (เข้าใกล้ 0.50 ถือว่าดีมาก)<br/>
                  • <strong>อำนาจจำแนก (r):</strong> ค่าบวกยิ่งมากยิ่งดี หมายถึงคนเก่งตอบถูกคนอ่อนตอบผิด (ควรได้ 0.20 ขึ้นไป)
                </div>
                <div className="overflow-x-auto rounded-xl border border-slate-200">
                  <table className="min-w-full text-center">
                    <thead className="bg-slate-100">
                      <tr>
                        <th className="border p-3">ข้อที่</th>
                        <th className="border p-3 bg-blue-50/50">ความยาก (p)</th>
                        <th className="border p-3 bg-blue-50/50">แปลผลความยาก</th>
                        <th className="border p-3 bg-purple-50/50">อำนาจจำแนก (r)</th>
                        <th className="border p-3 bg-purple-50/50">แปลผลจำแนก</th>
                        <th className="border p-3">สรุปคุณภาพข้อสอบ</th>
                      </tr>
                    </thead>
                    <tbody>
                      {results.itemStats.map((item, i) => (
                        <tr key={i} className="border-b hover:bg-slate-50">
                          <td className="border p-3 font-bold bg-slate-50">{item.q}</td>
                          <td className="border p-3 font-medium">{item.p}</td>
                          <td className="border p-3 text-slate-600">{item.pMeaning}</td>
                          <td className="border p-3 font-medium">{item.r}</td>
                          <td className="border p-3 text-slate-600">{item.rMeaning}</td>
                          <td className="border p-3 font-bold">
                            {item.action === "เก็บไว้ใช้ได้" ? 
                              <span className="text-emerald-600">{item.action}</span> : 
                              <span className="text-red-500">{item.action}</span>
                            }
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen flex flex-col font-sans">
          <div className="flex-grow p-4 md:p-8 no-print">
            <div className="max-w-7xl mx-auto">
              
              <header className="mb-10 text-center animate-fade-in">
                <h1 className="text-4xl font-bold text-slate-800 mb-2 drop-shadow-sm">ระบบตรวจและวิเคราะห์คุณภาพข้อสอบ</h1>
                <p className="text-xl text-slate-500">Item Analysis & Test Grading System</p>
              </header>

              <main className="transition-all duration-300">
                {step === 1 && renderStep1Setup()}
                {step === 2 && renderStep2Input()}
                {step === 3 && renderStep3Report()}
              </main>

            </div>
          </div>

          <ModalOverlay />
          <ToastNotification />

          <footer className="py-6 mt-auto text-center border-t border-slate-200 bg-white print:border-none print:bg-transparent">
            <p className="font-bold text-slate-800 text-lg">รายงานผลการตรวจและวิเคราะห์คุณภาพข้อสอบ (Item Analysis & Grading System)</p>
            <p className="text-slate-600 mt-1 font-medium">ประมวลผลด้วยระบบคอมพิวเตอร์</p>
            <p className="mt-2 text-sm text-slate-400">© {new Date().getFullYear()} All rights reserved.</p>
          </footer>
        </div>
      );
    };

    // Render application
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
